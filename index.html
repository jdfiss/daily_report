adius:5px;margin:10px 0;background:linear-gradient(to right,#c0392b,#e74c3c,#f39c12,#27ae60,#1a7a3c)}\n.fg-indicator{width:12px;height:12px;border-radius:50%;background:#2c3e50;position:relative;top:-11px;transition:left .5s}\n\n/* Breadth */\n.breadth-row{display:flex;gap:8px;align-items:center;font-size:13px;flex-wrap:wrap}\n.br-up{color:#c0392b;font-weight:700}\n.br-dn{color:#27ae60;font-weight:700}\n.br-flat{color:#7f8c8d}\n\n.disclaimer{font-size:10px;color:#aab;margin-top:22px;padding:10px;background:#f8f9fa;border-radius:6px;line-height:1.7}\n\n/* Macro Environment */\n.macro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}\n.macro-card{background:white;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);text-align:center}\n.mc-label{font-size:10px;color:#95a5a6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}\n.mc-value{font-size:20px;font-weight:700;color:#2c3e50;margin-bottom:4px}\n.mc-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}\n.mc-neutral{background:#eaf4ff;color:#2980b9}.mc-normal{background:#eaffea;color:#27ae60}\n.mc-warm{background:#fff8e6;color:#e67e22}.mc-hot{background:#fff0f0;color:#e74c3c}\n.mc-tight{background:#fff0f0;color:#c0392b}.mc-warn{background:#fff8e6;color:#f39c12}\n/* Fundamental score cards */\n.fund-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}\n.fund-card{background:white;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.07)}\n.fund-card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}\n.fund-card-sym{font-size:16px;font-weight:700}\n.fund-dim{margin-bottom:7px}\n.fund-dim-hdr{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;color:#555}\n.fund-dim-bar{height:7px;border-radius:4px;background:#ecf0f1;overflow:hidden}\n.fund-dim-fill{height:100%;border-radius:4px}\n\n@media(max-width:900px){\n  .status-bar{grid-template-columns:repeat(3,1fr)}\n}\n@media(max-width:700px){\n  .status-bar{grid-template-columns:1fr 1fr}\n  .two-col,.three-col{grid-template-columns:1fr}\n  .header{flex-direction:column;gap:10px}\n}\n@media print{\n  body{background:white}\n  .page{padding:10px}\n}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n<!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n     HEADER\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->\n<div class=\"header\">\n  <div>\n    <h1>рҹҗҶ йЈҶиӮЎзҚөдәә вҖ” зӣӨеҫҢж—Ҙе ұ<\/h1>\n    <div class=\"meta\">ж—Ҙжңҹпјҡ2026-03-24гҖҖз”ўз”ҹпјҡ2026-03-24 19:13гҖҖжң¬йҮ‘пјҡ5,000 TWDгҖҖиӮЎзҘЁжұ пјҡ~500 е°ҸеһӢиӮЎ<\/div>\n  <\/div>\n  <div class=\"mode-badge\">зӣӨеҫҢж—Ҙе ұ<\/div>\n<\/div>\n\n<!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n     2. Portfolio gate вҖ” 4зҮҲиҷҹзӢҖж…ӢеҲ—\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->\n<div class=\"status-bar\">\n  <div class=\"sc\">\n    <div class=\"sl\">еӨ§зӣӨ Regime<\/div>\n    <div class=\"sv\" style=\"color:#27ae60;font-size:15px\">рҹҹў еј·еӨҡй ӯ<\/div>\n    <div class=\"sd\">жңҖеӨҡ 3 ж§Ҫ<br><small style=\"color:#27ae60\">еӨңзӣӨ 33,185 (+404  +1.22%)  19:12<\/small><\/div>\n  <\/div>\n  <div class=\"sc\">\n    <div class=\"sl\">NASDAQ / S&amp;P500 / DJI<\/div>\n    <div class=\"sv\" style=\"color:#27ae60;font-size:13px\">рҹҹў NASDAQ жӯЈеёё<\/div>\n    <div class=\"sd\">\n      NQ +1.4%<br>\n      SP <span style=\"color:#27ae60;font-weight:700\">+1.1%<\/span> &nbsp; DJ <span style=\"color:#27ae60;font-weight:700\">+1.4%<\/span><br>\n      <span style=\"color:#e67e22;font-weight:600\">SOX <span style=\"color:#27ae60;font-weight:700\">+1.3%<\/span><\/span>\n    <\/div>\n  <\/div>\n  <div class=\"sc\">\n    <div class=\"sl\">VIX зҮҲиҷҹ<\/div>\n    <div class=\"sv\" style=\"color:#f39c12;font-size:15px\">рҹҹЎ иӯҰжҲ’<\/div>\n    <div class=\"sd\">VIX=26.35пјҲеқҮ19.44пјү<\/div>\n  <\/div>\n  <div class=\"sc\">\n    <div class=\"sl\">жҒҗж…ҢиІӘе©Ә<\/div>\n    <div class=\"sv\" style=\"color:#27ae60;font-size:18px;font-weight:800\">73.4<\/div>\n    <div class=\"sd\" style=\"color:#27ae60\">иІӘе©Ә рҹҳҠ<\/div>\n  <\/div>\n  <div class=\"sc\">\n    <div class=\"sl\">еёӮе ҙе»ЈеәҰ<\/div>\n    <div class=\"sv\" style=\"font-size:13px\">\n      <span class=\"br-up\">в–І444<\/span> &nbsp;\n      <span class=\"br-dn\">в–ј534<\/span> &nbsp;\n      <span class=\"br-flat\">=0<\/span>\n    <\/div>\n    <div class=\"sd\">жҲҗдәӨ 6,279 е„„ пҪңйҮҸжҜ” <span style=\"color:#27ae60\">2.09x<\/span><\/div>\n  <\/div>\n  <div class=\"sc\">\n    <div class=\"sl\">еҖүдҪҚе®№йҮҸ<\/div>\n    <div class=\"sv\" style=\"color:#2980b9\">0 / 3 ж§Ҫ<\/div>\n    <div class=\"sd\">з©әдҪҚ 3 ж§Ҫ<\/div>\n  <\/div>\n<\/div>\n\n<div class=\"op-hint\">вҡ пёҸ VIX иӯҰжҲ’ вҶ’ еӢ•ж…Ӣй–ҖжӘ» +5пјҢи¬№ж…ҺйҖІе ҙ<\/div>\n\n<!-- В§0 е®Ҹи§Җз’°еўғ -->\n<h2>В§ 0&nbsp; е®Ҹи§Җз’°еўғ <span class=\"badge-src\">FRED В· yfinance<\/span><\/h2>\n<div class=\"macro-grid\">\n<div class=\"macro-card\"><div class=\"mc-label\">Fed еҹәжә–еҲ©зҺҮ<\/div><div class=\"mc-value\">3.75%<\/div><span class=\"mc-badge mc-neutral\">дёӯжҖ§<\/span><\/div><div class=\"macro-card\"><div class=\"mc-label\">зҫҺ 10Y ж®–еҲ©зҺҮ<\/div><div class=\"mc-value\">4.33%<\/div><span class=\"mc-badge mc-warm\">дёӯжҖ§еҒҸй«ҳ<\/span><\/div><div class=\"macro-card\"><div class=\"mc-label\">ж®–еҲ©зҺҮеҲ©е·®\n(10Y-3M)<\/div><div class=\"mc-value\">+0.72%<\/div><span class=\"mc-badge mc-normal\">жӯЈеёё<\/span><\/div><div class=\"macro-card\"><div class=\"mc-label\">CPI Y
